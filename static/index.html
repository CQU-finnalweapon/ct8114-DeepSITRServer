<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>GJB8114 代码静态分析</title>
<style>
:root {
  --bg: #f0f0f0; --surface: #ffffff; --border: #d0d0d0;
  --text: #1a1a1a; --text-secondary: #666; --text-muted: #999;
  --primary: #0078d4; --primary-dark: #005a9e; --primary-light: #cce4f7;
  --error: #c62828; --error-bg: #fde7e7;
  --warning: #e65100; --warning-bg: #fff3e0;
  --ok: #2e7d32; --ok-bg: #e8f5e9; --info: #1565c0;
  --menubar-bg: #e8e8e8; --toolbar-bg: #f5f5f5;
  --sidebar-bg: #fafafa; --statusbar-bg: #e8e8e8;
  --tree-hover: #dce4f0; --tree-selected: #cce4f7;
  --radius: 2px; font-size: 13px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Microsoft YaHei","Segoe UI",Tahoma,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}
.menubar{background:var(--menubar-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 4px;height:26px;flex-shrink:0}
.menubar .menu-item{padding:2px 10px;font-size:12px;cursor:pointer;border-radius:var(--radius)}
.menubar .menu-item:hover{background:var(--primary-light)}
.menubar .brand{margin-left:auto;font-size:11px;color:var(--text-muted);padding-right:10px}
.toolbar{background:var(--toolbar-bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;padding:3px 8px;height:34px;flex-shrink:0}
.toolbar button{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;font-size:12px;border:1px solid transparent;background:transparent;border-radius:var(--radius);cursor:pointer;color:var(--text)}
.toolbar button:hover{background:#e0e0e0;border-color:#ccc}
.toolbar button:disabled{color:#bbb;cursor:default}
.toolbar button:disabled:hover{background:transparent;border-color:transparent}
.toolbar .sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.toolbar .btn-primary{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
.toolbar .btn-primary:hover{background:var(--primary-dark)}
.main-area{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;min-width:220px;background:var(--sidebar-bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-tabs{display:flex;background:var(--menubar-bg);border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tab{flex:1;padding:6px 8px;font-size:12px;text-align:center;cursor:pointer;border:none;background:transparent;color:var(--text-secondary);border-bottom:2px solid transparent}
.sidebar-tab:hover{background:#e8e8e8}
.sidebar-tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.sidebar-pane{display:none;flex:1;overflow:hidden;flex-direction:column}
.sidebar-pane.active{display:flex}
.tree-panel{flex:1;overflow:auto;padding:4px 0}
.tree-panel::-webkit-scrollbar{width:6px}
.tree-panel::-webkit-scrollbar-track{background:transparent}
.tree-panel::-webkit-scrollbar-thumb{background:#c0c0c0;border-radius:3px}
.tree-item{display:flex;align-items:center;padding:3px 8px 3px 4px;cursor:pointer;font-size:12px;gap:4px;white-space:nowrap}
.tree-item:hover{background:var(--tree-hover)}
.tree-item.selected{background:var(--tree-selected);color:var(--primary-dark);font-weight:600}
.tree-item .icon{font-size:13px;flex-shrink:0}
.sidebar-actions{border-top:1px solid var(--border);padding:8px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.sidebar-actions input[type=text]{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--surface)}
.sidebar-actions input:focus{outline:none;border-color:var(--primary)}
.sidebar-actions button{padding:5px 12px;font-size:12px;border:1px solid var(--border);background:var(--surface);border-radius:var(--radius);cursor:pointer}
.sidebar-actions button:hover{background:#e8e8e8}
.sidebar-actions button.prim{background:var(--primary);color:#fff;border-color:var(--primary-dark)}
.sidebar-actions button.prim:hover{background:var(--primary-dark)}
.sidebar-actions .upload-hint{font-size:11px;color:var(--text-muted);text-align:center;padding:6px;border:1px dashed var(--border);border-radius:var(--radius);cursor:pointer}
.sidebar-actions .upload-hint:hover{border-color:var(--primary);color:var(--primary)}
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.stats-bar{display:flex;gap:1px;background:var(--border);flex-shrink:0}
.stat-box{flex:1;background:var(--surface);padding:8px 12px;text-align:center;display:flex;flex-direction:column}
.stat-box .num{font-size:22px;font-weight:700;line-height:1.1}
.stat-box .lbl{font-size:11px;color:var(--text-secondary);margin-top:2px}
.stat-box.total .num{color:var(--info)}
.stat-box.err .num{color:var(--error)}
.stat-box.warn .num{color:var(--warning)}
.stat-box.ok .num{color:var(--ok)}
.result-area{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
.result-header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--menubar-bg)}
.filter-group{display:flex;gap:4px;flex-wrap:wrap}
.filter-chip{padding:2px 8px;font-size:11px;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:var(--surface);color:var(--text-secondary);white-space:nowrap}
.filter-chip:hover{border-color:var(--primary)}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.filter-chip .count{opacity:0.7;font-size:10px;margin-left:2px}
.search-box input{padding:4px 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;width:200px}
.search-box input:focus{outline:none;border-color:var(--primary)}
.result-table-wrap{flex:1;overflow:auto}
.result-table-wrap::-webkit-scrollbar{width:6px;height:6px}
.result-table-wrap::-webkit-scrollbar-track{background:transparent}
.result-table-wrap::-webkit-scrollbar-thumb{background:#c0c0c0;border-radius:3px}
.result-table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.result-table th{position:sticky;top:0;background:#f0f0f0;border-bottom:2px solid var(--border);padding:6px 8px;text-align:left;font-weight:600;color:var(--text-secondary);z-index:1}
.result-table td{padding:4px 8px;border-bottom:1px solid #eee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-table tr:hover td{background:var(--tree-hover)}
.result-table tr.selected td{background:var(--tree-selected)}
.result-table .col-lvl{width:56px}
.result-table .col-rule{width:130px}
.result-table .col-file{width:160px}
.result-table .col-line{width:56px;text-align:center}
.result-table .badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
.badge-err{background:var(--error-bg);color:var(--error)}
.badge-warn{background:var(--warning-bg);color:var(--warning)}
.detail-panel{border-top:2px solid var(--border);background:var(--surface);flex-shrink:0;max-height:40%;display:flex;flex-direction:column}
.detail-header{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:var(--menubar-bg);border-bottom:1px solid var(--border);flex-shrink:0}
.detail-header span{font-size:12px;font-weight:600;color:var(--text-secondary)}
.detail-close{cursor:pointer;padding:2px 6px;border:none;background:transparent;font-size:14px;color:var(--text-muted)}
.detail-close:hover{color:var(--error)}
.detail-body{flex:1;overflow:auto;padding:8px;font-family:Consolas,monospace;font-size:12px}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:12px}
.detail-msg{color:var(--text);margin-bottom:6px;font-weight:600}
.detail-loc{color:var(--text-secondary);font-size:11px;margin-bottom:6px}
.statusbar{background:var(--statusbar-bg);border-top:1px solid var(--border);padding:2px 10px;font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:16px;height:22px;flex-shrink:0}
.statusbar .status-msg{flex:1}
.statusbar .status-info{color:var(--text-muted)}
.empty-state{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:13px;flex-direction:column;gap:8px}
.empty-icon{font-size:36px;opacity:0.3}
.hidden-input{display:none}
@media(max-width:900px){.sidebar{width:200px;min-width:160px}}
</style>
</head>
<body>
<div class="menubar">
<span class="menu-item" onclick="alert('ct8114 v2 - codetidy engine')">文件(F)</span>
<span class="menu-item" onclick="document.getElementById('fileInput').click()">打开源文件(O)</span>
<span class="menu-item" onclick="handleAnalyze()">开始分析(A)</span>
<span class="menu-item" onclick="exportResults()">导出报告(E)</span>
<span class="brand">GJB 8114 代码静态分析 — codetidy 引擎</span>
</div>
<div class="toolbar">
<button class="btn-primary" onclick="handleAnalyze()" id="btnAnalyze" disabled>▶ 开始分析</button>
<button onclick="document.getElementById('fileInput').click()">📂 打开文件</button>
<span class="sep"></span>
<button onclick="exportResults()" id="btnExport" disabled>💾 导出</button>
<button onclick="document.getElementById('dsitFile').click()" title="加载 DeepSITRServer 输出 .zip">📦 加载报告</button>
<span class="sep"></span>
<span style="font-size:11px;color:var(--text-muted);margin-left:auto" id="toolbarInfo"></span>
</div>
<div class="main-area">
<div class="sidebar">
<div class="sidebar-tabs">
<button class="sidebar-tab active" data-pane="paneFiles">项目文件</button>
<button class="sidebar-tab" data-pane="paneRules">规则分类</button>
<button class="sidebar-tab" data-pane="paneReports">报告列表</button>
</div>
<div class="sidebar-pane active" id="paneFiles">
<div class="tree-panel" id="fileTree">
<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center">点击工具栏「📂 打开文件」<br>或拖拽 .c/.cpp 文件到此处</div>
</div>
<div class="sidebar-actions">
<input type="text" id="localPathInput" placeholder="或输入 DeepSITRServer 输出目录路径...">
<button onclick="loadLocalDsit()">从路径加载</button>
<div class="upload-hint" onclick="document.getElementById('fileInput').click()">📁 点击选择源文件（支持多选）</div>
<input type="file" id="fileInput" class="hidden-input" multiple accept=".c,.h,.cc,.cpp,.cxx,.hpp,.hxx">
</div>
</div>
<div class="sidebar-pane" id="paneRules">
<div class="tree-panel" id="ruleTree">
<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center">分析完成后显示<br>检测到的规则分类</div>
</div>
</div>
<div class="sidebar-pane" id="paneReports">
<div class="tree-panel" id="reportList">
<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center">加载 DSIT 报告后<br>在此处显示历史记录</div>
</div>
<div class="sidebar-actions">
<input type="file" id="dsitFile" class="hidden-input" accept=".zip">
<button class="prim" onclick="document.getElementById('dsitFile').click()">📦 上传 DSIT 报告 .zip</button>
<button onclick="loadDsitReports()">🔄 刷新列表</button>
</div>
</div>
</div>
<div class="content">
<div class="stats-bar">
<div class="stat-box total"><div class="num" id="stTotal">-</div><div class="lbl">问题总数</div></div>
<div class="stat-box err"><div class="num" id="stErr">-</div><div class="lbl">错误</div></div>
<div class="stat-box warn"><div class="num" id="stWarn">-</div><div class="lbl">警告</div></div>
<div class="stat-box ok"><div class="num" id="stKinds">-</div><div class="lbl">检查项种类</div></div>
<div class="stat-box" style="flex:0.7"><div class="num" id="stFiles">-</div><div class="lbl">分析文件</div></div>
</div>
<div class="result-area">
<div class="result-header">
<div class="filter-group" id="filterGroup"><span class="filter-chip active" data-filter="">全部</span></div>
<div class="search-box"><input type="text" id="searchInput" placeholder="搜索规则/文件/消息..."></div>
</div>
<div class="result-table-wrap">
<div class="empty-state" id="emptyState"><span class="empty-icon">📋</span><span>打开源文件并点击「开始分析」查看诊断结果</span></div>
<table class="result-table" id="resultTable" style="display:none">
<thead><tr>
<th class="col-lvl">级别</th><th class="col-rule">规则编号</th><th class="col-file">文件</th>
<th class="col-line">行:列</th><th class="col-msg">诊断描述</th><th class="col-checker">检查器</th>
</tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>
<div class="detail-panel" id="detailPanel" style="display:none">
<div class="detail-header">
<span id="detailTitle">诊断详情</span>
<button class="detail-close" onclick="closeDetail()">✕</button>
</div>
<div class="detail-body" id="detailBody"><div class="detail-empty">点击表格中的行查看详情</div></div>
</div>
</div>
</div>
<div class="statusbar">
<span class="status-msg" id="statusMsg">就绪</span>
<span class="status-info" id="statusInfo"></span>
</div>
<script>var state = { files: [], diagnostics: [], filterRule: '', selectedRow: -1, report: null, projectName: '' };
var $ = function(id) { return document.getElementById(id); };

// --- 文件选择 ---
var fileInput = $('fileInput');
fileInput.addEventListener('change', function() {
  for (var i = 0; i < fileInput.files.length; i++) {
    var f = fileInput.files[i];
    var dup = false;
    for (var j = 0; j < state.files.length; j++) {
      if (state.files[j].name === f.name && state.files[j].size === f.size) { dup = true; break; }
    }
    if (!dup) state.files.push(f);
  }
  renderFileTree();
});

document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) {
  e.preventDefault();
  if (e.dataTransfer.files.length) {
    for (var i = 0; i < e.dataTransfer.files.length; i++) {
      var f = e.dataTransfer.files[i];
      var dup = false;
      for (var j = 0; j < state.files.length; j++) {
        if (state.files[j].name === f.name && state.files[j].size === f.size) { dup = true; break; }
      }
      if (!dup) state.files.push(f);
    }
    renderFileTree();
  }
});

function renderFileTree() {
  var tree = $('fileTree');
  if (state.files.length === 0) {
    tree.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center">点击工具栏「📂 打开文件」<br>或拖拽 .c/.cpp 文件到此处</div>';
    $('btnAnalyze').disabled = true;
    return;
  }
  var html = '';
  for (var i = 0; i < state.files.length; i++) {
    var f = state.files[i];
    html += '<div class="tree-item"><span class="icon">📄</span><span>' + escHtml(f.name) + '</span><span style="margin-left:auto;font-size:10px;color:var(--text-muted)">' + fmtSize(f.size) + '</span><span style="cursor:pointer;color:var(--text-muted);margin-left:4px" onclick="removeFile(' + i + ');event.stopPropagation()">✕</span></div>';
  }
  tree.innerHTML = html;
  $('btnAnalyze').disabled = false;
  setStatus('已选择 ' + state.files.length + ' 个文件');
}

function removeFile(i) { state.files.splice(i, 1); renderFileTree(); }

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(1) + ' MB';
}

// --- 分析 ---
async function handleAnalyze() {
  if (state.files.length === 0) { setStatus('请先选择待分析的源文件', 'err'); return; }
  setStatus('正在分析...');
  $('btnAnalyze').disabled = true;
  $('btnAnalyze').textContent = '⏳ 分析中...';
  var fd = new FormData();
  for (var i = 0; i < state.files.length; i++) { fd.append('files', state.files[i]); }
  try {
    var resp = await fetch('/analyze', { method: 'POST', body: fd });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || 'HTTP ' + resp.status);
    var report = data.report || {};
    var summary = report.summary || {};
    var bugs = summary.bugs || [];
    state.report = report;
    state.diagnostics = bugs;
    state.projectName = report.project_name || '直接上传';
    state.selectedRow = -1;
    renderResults();
    renderRuleTree();
    $('btnExport').disabled = false;
    var total = summary.total_bugs != null ? summary.total_bugs : bugs.length;
    setStatus('分析完成 — ' + state.projectName + ' — ' + total + ' 条诊断', 'ok');
    $('toolbarInfo').textContent = state.files.length + ' 文件 · ' + total + ' 问题';
  } catch (err) {
    setStatus('分析失败: ' + (err.message || err), 'err');
  } finally {
    $('btnAnalyze').disabled = state.files.length === 0;
    $('btnAnalyze').textContent = '▶ 开始分析';
  }
}

// --- 结果表格 ---
function renderResults() {
  var bugs = state.diagnostics;
  var table = $('resultTable');
  var tbody = $('tableBody');
  var empty = $('emptyState');
  var filterGroup = $('filterGroup');

  var byLevel = {}, byRule = {};
  for (var i = 0; i < bugs.length; i++) {
    var b = bugs[i];
    var lvl = b.level || 'Warning';
    byLevel[lvl] = (byLevel[lvl] || 0) + 1;
    var rule = b.rule_id || b.checker || '(unknown)';
    byRule[rule] = (byRule[rule] || 0) + 1;
  }
  $('stTotal').textContent = bugs.length;
  $('stErr').textContent = byLevel['Error'] || 0;
  $('stWarn').textContent = byLevel['Warning'] || 0;
  $('stKinds').textContent = Object.keys(byRule).length;
  $('stFiles').textContent = state.files.length || '-';

  var entries = [];
  for (var k in byRule) { if (byRule.hasOwnProperty(k)) entries.push([k, byRule[k]]); }
  entries.sort(function(a,b) { return b[1] - a[1]; });

  filterGroup.innerHTML = '<span class="filter-chip active" data-filter="">全部 <span class="count">' + bugs.length + '</span></span>';
  for (var e = 0; e < entries.length; e++) {
    var name = entries[e][0], cnt = entries[e][1];
    var chip = document.createElement('span');
    chip.className = 'filter-chip';
    chip.setAttribute('data-filter', name);
    chip.innerHTML = escHtml(name) + ' <span class="count">' + cnt + '</span>';
    chip.onclick = (function(n) { return function() { state.filterRule = n; renderResults(); }; })(name);
    filterGroup.appendChild(chip);
  }

  if (state.filterRule) {
    var chips = filterGroup.querySelectorAll('.filter-chip');
    for (var c = 0; c < chips.length; c++) {
      chips[c].classList.toggle('active', chips[c].getAttribute('data-filter') === state.filterRule);
    }
  }

  var kw = ($('searchInput').value || '').toLowerCase();
  var filtered = bugs.slice();
  if (state.filterRule) {
    filtered = filtered.filter(function(b) { return (b.rule_id || b.checker) === state.filterRule; });
  }
  if (kw) {
    filtered = filtered.filter(function(b) {
      return (b.rule_id||'').toLowerCase().indexOf(kw) !== -1 ||
             (b.checker||'').toLowerCase().indexOf(kw) !== -1 ||
             (b.message||'').toLowerCase().indexOf(kw) !== -1 ||
             (b.file_path||'').toLowerCase().indexOf(kw) !== -1;
    });
  }

  if (filtered.length === 0) {
    table.style.display = 'none';
    empty.style.display = 'flex';
    empty.innerHTML = '<span class="empty-icon">🔍</span><span>没有匹配的诊断结果</span>';
  } else {
    table.style.display = '';
    empty.style.display = 'none';
    var html = '';
    for (var i = 0; i < filtered.length; i++) {
      var b = filtered[i];
      var lvl = b.level || 'Warning';
      var badgeCls = lvl === 'Error' ? 'badge-err' : 'badge-warn';
      var file = shortenPath(b.file_path || '');
      var pos = (b.line != null ? b.line : '?') + ':' + (b.column != null ? b.column : '?');
      var sel = i === state.selectedRow ? ' selected' : '';
      html += '<tr class="' + sel + '" onclick="selectRow(' + i + ')" ondblclick="selectRow(' + i + ');showDetail(' + i + ')">' +
        '<td class="col-lvl"><span class="badge ' + badgeCls + '">' + escHtml(lvl) + '</span></td>' +
        '<td class="col-rule" title="' + escAttr(b.rule_id||'') + '">' + escHtml(b.rule_id || b.checker || '') + '</td>' +
        '<td class="col-file" title="' + escAttr(b.file_path||'') + '">' + escHtml(file) + '</td>' +
        '<td class="col-line">' + escHtml(pos) + '</td>' +
        '<td class="col-msg" title="' + escAttr(b.message||'') + '">' + escHtml(b.message || '') + '</td>' +
        '<td class="col-checker">' + escHtml((b.checker||'').split('.').pop() || '') + '</td>' +
      '</tr>';
    }
    tbody.innerHTML = html;
  }
}

function selectRow(i) { state.selectedRow = i; renderResults(); }
$('searchInput').addEventListener('input', function() { renderResults(); });

// --- 规则树 ---
function renderRuleTree() {
  var tree = $('ruleTree');
  var rules = {};
  for (var i = 0; i < state.diagnostics.length; i++) {
    var b = state.diagnostics[i];
    var rule = b.rule_id || b.checker || '(unknown)';
    if (!rules[rule]) rules[rule] = { count: 0 };
    rules[rule].count++;
  }
  var entries = [];
  for (var k in rules) { if (rules.hasOwnProperty(k)) entries.push([k, rules[k].count]); }
  entries.sort(function(a,b) { return b[1] - a[1]; });
  var html = '';
  for (var e = 0; e < entries.length; e++) {
    var name = entries[e][0], cnt = entries[e][1];
    html += '<div class="tree-item" onclick="filterByRule(\'' + escAttr(name) + '\')" title="' + escAttr(name) + '"><span class="icon">📏</span><span>' + escHtml(name) + '</span><span style="margin-left:auto;font-size:10px;color:var(--text-muted)">' + cnt + '</span></div>';
  }
  tree.innerHTML = html;
}

function filterByRule(rule) {
  state.filterRule = rule;
  var tabs = document.querySelectorAll('.sidebar-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  var panes = document.querySelectorAll('.sidebar-pane');
  for (var i = 0; i < panes.length; i++) panes[i].classList.remove('active');
  document.querySelector('[data-pane="paneRules"]').classList.add('active');
  $('paneRules').classList.add('active');
  renderResults();
}

// --- 详情 ---
function showDetail(i) {
  var bugs = getFilteredBugs();
  var bug = bugs[i];
  if (!bug) return;
  $('detailPanel').style.display = 'flex';
  $('detailTitle').textContent = (bug.rule_id || bug.checker || '诊断') + ' — ' + shortenPath(bug.file_path || '');
  $('detailBody').innerHTML =
    '<div class="detail-msg">' + escHtml(bug.message || '无描述') + '</div>' +
    '<div class="detail-loc">📄 ' + escHtml(bug.file_path || '') + ' : ' + (bug.line || '?') + ':' + (bug.column || '?') + '</div>' +
    '<div class="detail-loc">🔍 检查器: ' + escHtml(bug.checker || '') + '</div>' +
    '<div class="detail-loc" style="margin-top:4px">📏 规则: ' + escHtml(bug.rule_id || '') + ' | 级别: ' + escHtml(bug.level || '?') + '</div>';
}

function closeDetail() { $('detailPanel').style.display = 'none'; }

function getFilteredBugs() {
  var kw = ($('searchInput').value || '').toLowerCase();
  var bugs = state.diagnostics.slice();
  if (state.filterRule) bugs = bugs.filter(function(b) { return (b.rule_id || b.checker) === state.filterRule; });
  if (kw) {
    bugs = bugs.filter(function(b) {
      return (b.rule_id||'').toLowerCase().indexOf(kw) !== -1 ||
             (b.checker||'').toLowerCase().indexOf(kw) !== -1 ||
             (b.message||'').toLowerCase().indexOf(kw) !== -1 ||
             (b.file_path||'').toLowerCase().indexOf(kw) !== -1;
    });
  }
  return bugs;
}

// --- DSIT ---
async function loadLocalDsit() {
  var path = $('localPathInput').value.trim();
  if (!path) { setStatus('请输入路径', 'err'); return; }
  setStatus('正在从本地路径加载...');
  var fd = new FormData();
  fd.append('local_path', path);
  try {
    var resp = await fetch('/dsit/upload-local', { method: 'POST', body: fd });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail);
    setStatus('加载成功: ' + (data.summary ? data.summary.total_bugs : 0) + ' 条诊断', 'ok');
    loadDsitReports(data.report_id);
  } catch (err) { setStatus('加载失败: ' + (err.message || err), 'err'); }
}

$('dsitFile').addEventListener('change', async function() {
  var file = $('dsitFile').files[0];
  if (!file) return;
  setStatus('正在上传并解析...');
  var fd = new FormData();
  fd.append('file', file);
  try {
    var resp = await fetch('/dsit/upload', { method: 'POST', body: fd });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.detail);
    setStatus('上传成功: ' + (data.summary ? data.summary.total_bugs : 0) + ' 条诊断', 'ok');
    loadDsitReports(data.report_id);
  } catch (err) { setStatus('上传失败: ' + (err.message || err), 'err'); }
});

async function loadDsitReports(autoSelectId) {
  try {
    var resp = await fetch('/dsit/reports');
    var data = await resp.json();
    var reports = data.reports || [];
    var list = $('reportList');
    if (reports.length === 0) {
      list.innerHTML = '<div style="padding:20px;color:var(--text-muted);font-size:12px;text-align:center">尚无报告<br>上传 DSIT 输出 .zip 或输入路径加载</div>';
    } else {
      var html = '';
      for (var i = 0; i < reports.length; i++) {
        var r = reports[i];
        html += '<div class="tree-item" onclick="loadDsitReport(\'' + escAttr(r.report_id) + '\')"><span class="icon">📊</span><span>' + escHtml(r.report_name || r.report_id) + '</span><span style="margin-left:auto;font-size:10px;color:var(--text-muted)">' + (r.total_files||0) + 'F/' + (r.total_bugs||0) + 'B</span></div>';
      }
      list.innerHTML = html;
    }
    if (autoSelectId) await loadDsitReport(autoSelectId);
  } catch (err) { setStatus('加载报告列表失败', 'err'); }
}

async function loadDsitReport(reportId) {
  try {
    var resp = await fetch('/dsit/report/' + encodeURIComponent(reportId));
    var data = await resp.json();
    var summary = data.summary || {};
    state.report = data;
    state.diagnostics = summary.bugs || [];
    state.projectName = data.project_name || reportId;
    state.selectedRow = -1;
    state.filterRule = '';
    renderResults();
    renderRuleTree();
    $('btnExport').disabled = false;
    $('toolbarInfo').textContent = (data.total_files||0) + ' 文件 · ' + (summary.total_bugs||0) + ' 问题';
    setStatus('已加载报告: ' + (data.project_name || reportId), 'ok');
    var tabs = document.querySelectorAll('.sidebar-tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    var panes = document.querySelectorAll('.sidebar-pane');
    for (var i = 0; i < panes.length; i++) panes[i].classList.remove('active');
    document.querySelector('[data-pane="paneReports"]').classList.add('active');
    $('paneReports').classList.add('active');
  } catch (err) { setStatus('加载报告失败: ' + (err.message || err), 'err'); }
}

// --- 导出 ---
function exportResults() {
  if (!state.report) return;
  var blob = new Blob([JSON.stringify(state.report, null, 2)], { type: 'application/json' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ct8114_report_' + Date.now() + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus('报告已导出');
}

// --- 工具 ---
function setStatus(msg, kind) {
  var el = $('statusMsg');
  el.textContent = msg || '';
  el.style.color = kind === 'err' ? 'var(--error)' : kind === 'ok' ? 'var(--ok)' : '';
}

function shortenPath(p) {
  if (!p) return '';
  var parts = p.split(/[\\/]/);
  return parts.slice(-2).join('/');
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escAttr(s) { return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// --- 侧边栏 ---
var sideTabs = document.querySelectorAll('.sidebar-tab');
for (var i = 0; i < sideTabs.length; i++) {
  sideTabs[i].addEventListener('click', function() {
    for (var j = 0; j < sideTabs.length; j++) sideTabs[j].classList.remove('active');
    var panes = document.querySelectorAll('.sidebar-pane');
    for (var j = 0; j < panes.length; j++) panes[j].classList.remove('active');
    this.classList.add('active');
    var paneId = this.getAttribute('data-pane');
    $(paneId).classList.add('active');
    if (paneId === 'paneReports') loadDsitReports();
  });
}

// --- 快捷键 ---
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'o') { e.preventDefault(); fileInput.click(); }
  if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); handleAnalyze(); }
  if (e.ctrlKey && e.key === 's') { e.preventDefault(); exportResults(); }
});

setStatus('就绪 — 按 Ctrl+O 打开文件，Ctrl+Enter 开始分析');
</script>
</body>
</html>
