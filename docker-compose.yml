version: "3.9"

# ==============================================================
# 卷职责划分:
#   uniportal_storage — UniPortal 共享卷 (可读写)
#     读取上传的 C/C++ 源码, 目录结构:
#         {portal_proj_id}/{item_id}/{解压后源码根目录}/
#     分析完成后, 报告写回 {item_id}/_ct8114/last_report.json
#   ct8114_local — 本工具私有读写卷
#     存放本工具自有上传的项目 (proj_*) 以及每次分析的报告
#         {project_id}/_ct8114/last_report.json
#   ct8114_tasks — 本工具私有读写卷
#     每次 clang-tidy 调用的沙盒目录 (fixes.yaml 等)
# ==============================================================

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    image: ct8114:v1
    container_name: ct8114
    ports:
      - "8006:8000"
    volumes:
      # UniPortal 共享卷 (可读写) — 分析报告写回 _ct8114/ 子目录
      - uniportal_storage:/data/uniportal
      # 本工具私有: 自上传项目 + 分析报告 (可读写)
      - ct8114_local:/app/local_workspaces
      # 本工具私有: clang-tidy 沙盒 (可读写)
      - ct8114_tasks:/app/workspaces/_tasks
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      # 共享卷源码路径 (可读写)
      - UNIPORTAL_STORAGE_PATH=/data/uniportal
      # 共享卷可写开关 (true=可写, false=只读)
      - UNIPORTAL_WRITABLE=true
      # 本工具生成物写入路径 (可读写)
      - LOCAL_WORKSPACES_DIR=/app/local_workspaces
      # codetidy 沙盒目录 (可读写)
      - TASKS_DIR=/app/workspaces/_tasks
      # 分析引擎: dcab_http 调用外部 DeepSITRServer HTTP 服务; codetidy 保留为本地 fallback
      - ANALYSIS_ENGINE=dcab_http
      - DCAB_BASE_URL=http://host.docker.internal:8080
      - DCAB_START_PATH=/start_progress
      - DCAB_CHECK_PATH=/check_progress
      - DCAB_REQUEST_TIMEOUT=15
      # 容器内无法直接运行 Windows DeepSITRServer.exe; 这里用于扫描挂载后的结果目录
      - DEEPSITR_WORKDIR=/data/deepsitr
      # GJB8114 检查项配置 (如需关闭部分检查, 在此调整)
      - CODETIDY_CHECKS=gjb8114-*,-gjb8114-r-1-3-8,-gjb8114-r-1-7-3,-gjb8114-r-1-7-7
    restart: unless-stopped

# ========== 本地开发覆盖 (docker-compose.override.yml) ==========
# 当需要本地测试且无真实 UniPortal 时, 创建 docker-compose.override.yml:
#
#   services:
#     app:
#       volumes:
#         - ./mock_uniportal:/data/uniportal
#       environment:
#         - MOCK_UNIPORTAL_DIR=/data/uniportal
#         - UNIPORTAL_STORAGE_PATH=

# ==============================================================
# 卷声明
# ==============================================================
volumes:
  # 引用 UniPortal 已创建的外部命名卷 (需先启动 UniPortal)
  uniportal_storage:
    external: true
  # 本工具私有: 自上传项目 + 分析报告
  ct8114_local:
    driver: local
  # 本工具私有: clang-tidy 沙盒
  ct8114_tasks:
    driver: local
